<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夜レジ式 FIFAエージェント用語マスター</title>

<!-- フォント：英語=Space Grotesk / 日本語=Noto Sans JP -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===================================================================
   デザインテーマ：夜のサッカーピッチ（深い緑背景＋白いライン）
   =================================================================== */
:root{
  --pitch-dark:#072418;
  --pitch:#0b3a25;
  --pitch-light:#10492f;
  --pitch-stripe:#0d4129;
  --line:rgba(255,255,255,0.90);
  --line-soft:rgba(255,255,255,0.16);
  --line-faint:rgba(255,255,255,0.08);
  --text:#f4f8f5;
  --text-dim:rgba(244,248,245,0.62);
  --gold:#e9c45c;
  --gold-deep:#caa23c;
  --good:#37d98a;       /* 思い出せた / マスター */
  --learn:#5ec8ff;      /* 学習中 */
  --new:#9aa6a0;        /* 未学習 */
  --flame:#ff8a3d;      /* ストリーク */
  --radius:18px;
  --shadow:0 18px 40px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Noto Sans JP',sans-serif; color:var(--text);
  background:
    repeating-linear-gradient(90deg, var(--pitch) 0 7%, var(--pitch-stripe) 7% 14%),
    radial-gradient(120% 80% at 50% -10%, var(--pitch-light), var(--pitch-dark));
  background-blend-mode:soft-light, normal;
  min-height:100%; overflow-x:hidden;
}
.field-lines{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.9;}
.app{position:relative; z-index:1; max-width:560px; margin:0 auto; padding:0 18px 48px;}

/* ---- ボタン ---- */
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:16px 20px; border-radius:14px; font-size:16px; font-weight:700;
  letter-spacing:0.02em; transition:transform .08s ease, opacity .15s ease, background .15s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:#3a2c05; box-shadow:0 10px 24px rgba(233,196,92,0.28);}
.btn-line{background:rgba(255,255,255,0.04); border:2px solid var(--line); color:var(--text);}
.btn-ghost{background:rgba(255,255,255,0.04); border:1px solid var(--line-soft); color:var(--text); font-weight:500;}
.btn:disabled{opacity:0.4; pointer-events:none;}
.btn-sm{width:auto; padding:10px 16px; font-size:14px; border-radius:11px;}

/* ---- 画面切り替え ---- */
.screen{display:none; animation:fade .35s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

/* ===================================================================
   ヘッダー
   =================================================================== */
.brand{text-align:center; padding:26px 0 14px;}
.brand .mark{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; letter-spacing:0.40em; color:var(--gold); text-transform:uppercase;}
.brand h1{margin:6px 0 0; font-size:21px; font-weight:900; letter-spacing:0.01em;}
.brand .sub{margin-top:4px; font-size:12px; color:var(--text-dim);}

/* ===================================================================
   ホーム
   =================================================================== */
/* ストリーク＋デイリーゴールのバナー */
.streak-banner{
  display:flex; align-items:center; gap:16px;
  background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border:1px solid var(--line-soft); border-radius:var(--radius); padding:16px 18px; margin:6px 0 16px;
}
.streak-flame{font-size:30px; line-height:1;}
.streak-info{flex:1;}
.streak-num{font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; line-height:1;}
.streak-num small{font-size:13px; font-weight:500; color:var(--text-dim); margin-left:4px;}
.streak-label{font-size:11px; color:var(--text-dim); margin-top:3px;}
/* リング */
.ring-wrap{position:relative; width:64px; height:64px; flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-text{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.ring-text b{font-family:'Space Grotesk',sans-serif; font-size:16px; line-height:1;}
.ring-text span{font-size:9px; color:var(--text-dim); margin-top:1px;}

/* メインCTA */
.cta-review{position:relative; margin-bottom:12px;}
.cta-review .badge-count{
  position:absolute; top:-8px; right:-6px; min-width:28px; height:28px; padding:0 8px;
  background:var(--good); color:#04361f; border-radius:99px; font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 12px rgba(55,217,138,0.4);
}
.home-cta{display:flex; flex-direction:column; gap:10px;}
.home-cta .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

/* 進捗チップ（color dot付き） */
.prog-chips{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:18px 0;}
.chip{background:rgba(255,255,255,0.04); border:1px solid var(--line-faint); border-radius:13px; padding:12px 6px; text-align:center;}
.chip .n{font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; line-height:1;}
.chip .l{font-size:10px; color:var(--text-dim); margin-top:6px; display:flex; align-items:center; justify-content:center; gap:4px;}
.dot{width:7px; height:7px; border-radius:99px; display:inline-block;}

/* マスター率バー */
.master-bar{height:8px; border-radius:99px; background:rgba(255,255,255,0.10); overflow:hidden; margin:2px 0 4px;}
.master-bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--good),#7ef0b6); border-radius:99px; transition:width .4s ease;}
.master-bar-label{font-size:11px; color:var(--text-dim); text-align:right; margin-bottom:18px;}

/* ヒートマップ（直近14日） */
.heat{display:flex; gap:5px; justify-content:space-between; margin:4px 0 18px;}
.heat .cell{flex:1; aspect-ratio:1; border-radius:4px; background:rgba(255,255,255,0.06);}
.heat .cell.l1{background:rgba(55,217,138,0.35);}
.heat .cell.l2{background:rgba(55,217,138,0.6);}
.heat .cell.l3{background:rgba(55,217,138,0.9);}

/* 実績バッジ */
.section-title{font-size:13px; font-weight:700; color:var(--text-dim); margin:20px 2px 10px; letter-spacing:0.04em;}
.badges{display:flex; gap:10px; flex-wrap:wrap;}
.badge{display:flex; flex-direction:column; align-items:center; gap:4px; width:64px;}
.badge .ic{width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; background:rgba(255,255,255,0.05); border:1px solid var(--line-faint);}
.badge.earned .ic{background:linear-gradient(180deg, rgba(233,196,92,0.25), rgba(233,196,92,0.08)); border-color:var(--gold);}
.badge.locked{opacity:0.35;}
.badge .nm{font-size:9px; color:var(--text-dim); text-align:center; line-height:1.3;}

/* 有料ティザー（ロック） */
.teaser{
  margin-top:18px; padding:18px; border-radius:var(--radius); position:relative; overflow:hidden;
  background:linear-gradient(135deg, rgba(16,73,47,0.6), rgba(7,36,24,0.6));
  border:1px solid var(--line-soft); cursor:pointer;
}
.teaser .lock{position:absolute; top:14px; right:16px; font-size:18px; opacity:0.7;}
.teaser .tt{font-size:15px; font-weight:700;}
.teaser .td{font-size:12px; color:var(--text-dim); margin-top:6px; line-height:1.6;}
.teaser .pill{display:inline-block; margin-top:10px; font-size:11px; font-weight:700; color:var(--gold); border:1px solid var(--gold); border-radius:99px; padding:4px 12px;}

.hint{margin-top:18px; padding:16px; border-radius:14px; background:rgba(255,255,255,0.03); border:1px dashed var(--line-soft); font-size:13px; color:var(--text-dim); line-height:1.7;}
.hint b{color:var(--text);}
.footer-note{text-align:center; font-size:11px; color:rgba(255,255,255,0.28); padding:26px 0 6px;}

/* ===================================================================
   学習画面
   =================================================================== */
.study-top{display:flex; align-items:center; justify-content:space-between; padding:18px 2px 8px;}
.study-top .quit{font-size:13px; color:var(--text-dim); padding:8px 6px;}
.study-mode-tag{font-size:12px; color:var(--gold); font-weight:700; letter-spacing:0.04em;}
.session-meta{font-size:13px; color:var(--text-dim); font-weight:500;}
.session-meta b{color:var(--gold); font-family:'Space Grotesk',sans-serif; font-size:16px;}
.progress{height:7px; border-radius:99px; background:rgba(255,255,255,0.10); overflow:hidden; margin:2px 2px 20px;}
.progress > i{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--good),#7ef0b6); border-radius:99px; transition:width .35s ease;}

.card-wrap{perspective:1400px; margin-bottom:14px;}
.card{position:relative; width:100%; min-height:330px; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,.18,.2,1); cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px 24px; border-radius:24px; border:2px solid var(--line); box-shadow:var(--shadow);}
.face-front{background:radial-gradient(130% 90% at 50% 0%, var(--pitch-light), var(--pitch));}
.cat-tag{position:absolute; top:16px; left:16px; font-size:10px; font-weight:700; color:var(--text-dim); display:flex; align-items:center; gap:5px; letter-spacing:0.03em;}
.speak-btn{position:absolute; top:12px; right:12px; width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid var(--line-soft); display:flex; align-items:center; justify-content:center; font-size:18px;}
.speak-btn:active{transform:scale(0.9);}
.face-front .en{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:30px; line-height:1.25; letter-spacing:-0.01em;}
.face-front .tap{position:absolute; bottom:18px; font-size:12px; color:var(--text-dim); letter-spacing:0.06em;}
.face-back{transform:rotateY(180deg); background:radial-gradient(130% 90% at 50% 0%, #103a51, #0b2c3e); border-color:rgba(255,255,255,0.55);}
.face-back .en-small{font-family:'Space Grotesk',sans-serif; font-size:15px; color:rgba(255,255,255,0.55); margin-bottom:12px;}
.face-back .ja{font-size:26px; font-weight:700; line-height:1.4;}
.face-back .memo{margin-top:16px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.18); font-size:13.5px; color:rgba(255,255,255,0.85); line-height:1.7; max-width:92%;}

.judge{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:4px; opacity:0; pointer-events:none; transition:opacity .25s ease;}
.judge.show{opacity:1; pointer-events:auto;}
.btn-again{background:rgba(255,255,255,0.06); border:2px solid #fff; color:#fff;}
.btn-good{background:linear-gradient(180deg,var(--good),#23b873); color:#04361f; border:2px solid transparent; box-shadow:0 10px 24px rgba(55,217,138,0.25);}
.judge .btn{padding:17px 10px; font-weight:700;}
.judge .sub{display:block; font-size:11px; font-weight:500; opacity:0.8; margin-top:3px;}
.flip-help{text-align:center; font-size:11px; color:var(--text-dim); margin-top:13px;}

/* ===================================================================
   サマリー / 達成
   =================================================================== */
.done-wrap{text-align:center; padding:34px 10px;}
.trophy{font-size:66px; line-height:1; margin-bottom:8px; animation:pop .6s cubic-bezier(.2,1.4,.4,1) both;}
@keyframes pop{0%{transform:scale(0) rotate(-20deg);}100%{transform:scale(1) rotate(0);}}
.done-wrap .en-title{font-family:'Space Grotesk',sans-serif; letter-spacing:0.3em; font-size:12px; color:var(--gold); text-transform:uppercase;}
.done-wrap h2{font-size:24px; font-weight:900; margin:6px 0;}
.done-wrap .lead{color:var(--text-dim); font-size:14px; line-height:1.8; margin:10px 0 22px;}
.sum-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:0 0 24px;}
.sum-stat{background:rgba(255,255,255,0.04); border:1px solid var(--line-faint); border-radius:14px; padding:16px 6px;}
.sum-stat .n{font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; line-height:1;}
.sum-stat .n.good{color:var(--good);} .sum-stat .n.gold{color:var(--gold);} .sum-stat .n.flame{color:var(--flame);}
.sum-stat .l{font-size:10px; color:var(--text-dim); margin-top:6px;}

/* ===================================================================
   デッキ選択
   =================================================================== */
.deck-list{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
.deck-row{display:flex; align-items:center; gap:14px; background:rgba(255,255,255,0.04); border:1px solid var(--line-faint); border-radius:14px; padding:15px 16px; cursor:pointer; transition:background .15s;}
.deck-row:active{background:rgba(255,255,255,0.08);}
.deck-row.all{border-color:var(--gold); background:linear-gradient(135deg, rgba(233,196,92,0.12), rgba(255,255,255,0.02));}
.deck-row .dk-dot{width:12px; height:12px; border-radius:99px; flex-shrink:0;}
.deck-row .dk-info{flex:1;}
.deck-row .dk-name{font-size:15px; font-weight:700;}
.deck-row .dk-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}
.deck-row .dk-mini{font-size:10px; color:var(--text-dim); margin-top:5px;}
.deck-row .dk-mini b{color:var(--good);}
.deck-row .dk-go{font-size:18px; color:var(--text-dim);}

/* ===================================================================
   管理
   =================================================================== */
.section-head{display:flex; align-items:center; justify-content:space-between; padding:22px 2px 14px;}
.section-head h2{font-size:20px; font-weight:900; margin:0;}
.back-link{font-size:13px; color:var(--text-dim); padding:8px 6px;}
.term-form{background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border:1px solid var(--line-soft); border-radius:var(--radius); padding:18px; margin-bottom:18px;}
.term-form.editing{border-color:var(--gold);}
.form-title{font-size:14px; font-weight:700; margin-bottom:14px; color:var(--gold);}
.field{margin-bottom:12px;}
.field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;}
.field input, .field textarea, .field select{width:100%; padding:13px 14px; border-radius:11px; background:rgba(0,0,0,0.22); border:1px solid var(--line-soft); color:var(--text); font-family:inherit; font-size:15px; resize:vertical;}
.field input.en-input{font-family:'Space Grotesk',sans-serif;}
.field input:focus, .field textarea:focus, .field select:focus{outline:none; border-color:var(--gold);}
.form-actions{display:flex; gap:10px; margin-top:6px;}
.form-actions .btn{padding:13px;}

.tools-row{display:flex; gap:10px; margin-bottom:16px;}
.search-box{width:100%; padding:12px 14px; border-radius:11px; background:rgba(0,0,0,0.22); border:1px solid var(--line-soft); color:var(--text); font-family:inherit; font-size:14px; margin-bottom:12px;}
.cat-pills{display:flex; gap:7px; overflow-x:auto; padding-bottom:8px; margin-bottom:12px; -webkit-overflow-scrolling:touch;}
.cat-pills::-webkit-scrollbar{display:none;}
.pill-btn{flex-shrink:0; font-size:12px; padding:7px 13px; border-radius:99px; background:rgba(255,255,255,0.05); border:1px solid var(--line-faint); color:var(--text-dim); white-space:nowrap;}
.pill-btn.active{background:rgba(233,196,92,0.18); border-color:var(--gold); color:var(--gold); font-weight:700;}

.term-list{display:flex; flex-direction:column; gap:9px;}
.term-row{display:flex; align-items:center; gap:11px; background:rgba(255,255,255,0.04); border:1px solid var(--line-faint); border-radius:13px; padding:13px 14px;}
.term-row .st-dot{width:9px; height:9px; border-radius:99px; flex-shrink:0;}
.term-row .info{flex:1; min-width:0;}
.term-row .t-en{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.term-row .t-ja{font-size:13px; color:var(--text-dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.term-row .t-cat{font-size:10px; color:rgba(255,255,255,0.4); margin-top:3px;}
.row-actions{display:flex; gap:6px; flex-shrink:0;}
.icon-btn{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border:1px solid var(--line-faint); font-size:15px;}
.icon-btn:active{transform:scale(0.92);}
.count-badge{font-size:13px; color:var(--text-dim);}
.empty-note{text-align:center; color:var(--text-dim); font-size:14px; padding:24px; line-height:1.7;}

/* ===================================================================
   オンボーディング / モーダル
   =================================================================== */
.overlay{position:fixed; inset:0; z-index:40; background:rgba(4,18,12,0.82); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; padding:24px;}
.overlay.show{display:flex;}
.modal{max-width:420px; width:100%; background:linear-gradient(180deg, var(--pitch-light), var(--pitch-dark)); border:1px solid var(--line-soft); border-radius:22px; padding:28px 24px; box-shadow:var(--shadow); text-align:center; animation:pop .4s cubic-bezier(.2,1.2,.4,1) both;}
.modal .ic{font-size:46px; margin-bottom:6px;}
.modal h3{font-size:21px; font-weight:900; margin:6px 0 4px;}
.modal .mark{font-family:'Space Grotesk',sans-serif; letter-spacing:0.3em; font-size:11px; color:var(--gold); text-transform:uppercase;}
.modal p{color:var(--text-dim); font-size:14px; line-height:1.8; margin:14px 0;}
.modal .feat{text-align:left; margin:16px 0; display:flex; flex-direction:column; gap:13px;}
.modal .feat > div{font-size:14px; display:flex; gap:11px; align-items:flex-start; line-height:1.6;}
.modal .feat > div > div{flex:1;}
.modal .feat > div > div b{font-size:15px;}
.modal .feat .fic{font-size:18px; flex-shrink:0; margin-top:1px;}
.goal-opts{display:flex; flex-direction:column; gap:10px; margin:16px 0;}
.goal-opt{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-radius:13px; background:rgba(255,255,255,0.04); border:2px solid var(--line-faint); cursor:pointer;}
.goal-opt.sel{border-color:var(--gold); background:rgba(233,196,92,0.1);}
.goal-opt .gl{font-size:15px; font-weight:700;} .goal-opt .gr{font-size:12px; color:var(--text-dim);}

/* トースト / 祝福 */
.toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px); background:rgba(10,40,28,0.96); border:1px solid var(--gold); color:var(--text); padding:13px 22px; border-radius:99px; font-size:14px; font-weight:500; opacity:0; pointer-events:none; transition:all .3s ease; z-index:60; box-shadow:var(--shadow);}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
.celebrate{position:fixed; left:50%; top:22%; transform:translateX(-50%) scale(0.7); z-index:60; text-align:center; opacity:0; pointer-events:none; transition:all .35s cubic-bezier(.2,1.3,.4,1);}
.celebrate.show{opacity:1; transform:translateX(-50%) scale(1);}
.celebrate .cic{font-size:50px;} .celebrate .ct{font-weight:900; font-size:18px; margin-top:4px;} .celebrate .cs{font-size:12px; color:var(--gold);}
</style>
</head>

<body>

<!-- ピッチのライン（背景装飾） -->
<svg class="field-lines" viewBox="0 0 560 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="2">
    <rect x="20" y="20" width="520" height="860" rx="6"/>
    <line x1="20" y1="450" x2="540" y2="450"/>
    <circle cx="280" cy="450" r="78"/>
    <circle cx="280" cy="450" r="4" fill="rgba(255,255,255,0.13)"/>
    <rect x="150" y="20" width="260" height="120"/>
    <rect x="215" y="20" width="130" height="55"/>
    <rect x="150" y="760" width="260" height="120"/>
    <rect x="215" y="825" width="130" height="55"/>
  </g>
</svg>

<div class="app">

  <!-- ============ ホーム ============ -->
  <section id="screen-home" class="screen active">
    <header class="brand">
      <div class="mark">FIFA Agent Exam</div>
      <h1>エージェント用語マスター</h1>
      <div class="sub">夜のピッチで、覚えるまで反復する</div>
    </header>
    <div id="home-body"><!-- JSで描画 --></div>
    <div class="footer-note">FIFAエージェント試験 用語暗記 / v2.0</div>
  </section>

  <!-- ============ 学習 ============ -->
  <section id="screen-study" class="screen">

/* ---- Leitner間隔（箱→日数）。覚えた=箱を1つ上げる／もう一度=箱1に戻す ---- */
const INTERVALS = {1:1, 2:3, 3:7, 4:14, 5:30};
const MASTER_BOX = 5; // 箱5到達でマスター扱い

/* ---- デイリーゴール ---- */
const GOALS = {
  light:  {label:'軽め',     cards:10, newPerDay:6,  desc:'1日10枚 / 約5分'},
  normal: {label:'ふつう',   cards:20, newPerDay:12, desc:'1日20枚 / 約10分'},

};

/* ---- 実績 ---- */
const ACHIEVEMENTS = [
  {id:'first',    icon:'⚽', name:'キックオフ',    cond:()=>prog.totalAnswered>=1},
  {id:'study10',  icon:'👟', name:'はじめの一歩',  cond:()=>prog.totalAnswered>=10},
  {id:'streak3',  icon:'🔥', name:'3日連続',       cond:()=>prog.streak>=3},
  {id:'streak7',  icon:'🔥', name:'1週間連続',     cond:()=>prog.streak>=7},
  {id:'master10', icon:'⭐', name:'10語マスター',  cond:()=>masteredCount()>=10},
  {id:'master30', icon:'🌟', name:'30語マスター',  cond:()=>masteredCount()>=30},
  {id:'masterAll',icon:'🏆', name:'全マスター',    cond:()=>terms.length>0 && masteredCount()>=terms.length},
];

/* ===================================================================
   データ読み書き
   =================================================================== */
let terms = [];
let prog  = {};

function defaultProg(){
  return {onboarded:false, goalKey:'normal', streak:0, lastStudyDay:null,
          todayDate:null, todayCount:0, xp:0, totalAnswered:0, achievements:[], history:{}};
}
function loadAll(){
  // 用語
  const t = store.get(TERMS_KEY);
  if(t){ try{ terms = JSON.parse(t); }catch(e){ terms=[]; } }
  if(!t || !Array.isArray(terms) || terms.length===0){
    terms = SEED.map(s => newTerm(s));
    saveTerms();
  }
  // 進捗
  const p = store.get(PROG_KEY);
  if(p){ try{ prog = Object.assign(defaultProg(), JSON.parse(p)); }catch(e){ prog = defaultProg(); } }
  else { prog = defaultProg(); }
}
function newTerm(s){
  return {id:genId(), en:s.en, ja:s.ja, memo:s.memo||'', cat:s.cat||'def',
          box:0, status:'new', due:null, reps:0, lapses:0};
}
function saveTerms(){ store.set(TERMS_KEY, JSON.stringify(terms)); }
function saveProg(){ store.set(PROG_KEY, JSON.stringify(prog)); }
function genId(){ return 'id_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }

/* ===================================================================
   日付ヘルパー（ローカル日付 YYYY-MM-DD）
   =================================================================== */
function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(str,n){ const d=new Date(str+'T00:00:00'); d.setDate(d.getDate()+n); return todayStr(d); }
function shiftStr(n){ const d=new Date(); d.setDate(d.getDate()+n); return todayStr(d); }

/* ===================================================================
   集計
   =================================================================== */
const masteredCount = () => terms.filter(t=>t.status==='mastered').length;
const learningCount = () => terms.filter(t=>t.status==='learning').length;
const newCount      = () => terms.filter(t=>t.status==='new').length;

/* 今日の復習対象を組み立てる（due復習 ＋ 新規は1日上限） */
function buildTodayQueue(){
  const today = todayStr();
  const due = terms.filter(t => t.box>=1 && t.status!=='mastered' && t.due && t.due<=today);
  const dueMastered = terms.filter(t => t.status==='mastered' && t.due && t.due<=today); // マスター語の定期再確認
  const newAvail = terms.filter(t => t.box===0);
  const newPerDay = GOALS[prog.goalKey].newPerDay;
  const newToday = shuffle(newAvail.slice()).slice(0, newPerDay);
  return shuffle(due.concat(dueMastered)).concat(shuffle(newToday));
}

/* ===================================================================
   学習セッション（SRS / 完全マスター 共通）
   =================================================================== */
let session = null;

function startReview(mode, catKey){
  let ids, deckName, total;
  if(mode==='srs'){
    const q = buildTodayQueue();
    if(q.length===0){ toast('今日の復習はありません'); return; }
    ids = q.map(t=>t.id); deckName='今日の復習';
  }else{ // master
    let pool = catKey==='all' ? terms.slice() : terms.filter(t=>t.cat===catKey);
    if(pool.length===0){ toast('このデッキに用語がありません'); return; }
    ids = shuffle(pool.map(t=>t.id)); deckName = catKey==='all' ? '全用語' : catName(catKey);
  }
  session = {mode, queue:ids.slice(), total:ids.length, cleared:new Set(),
             answered:0, rememberedCount:0, againCount:0, xp:0, deckName, catKey};
  document.getElementById('mode-tag').textContent = mode==='srs' ? '今日の復習' : '完全マスター：'+deckName;
  showScreen('study');
  nextCard();
}

function nextCard(){
  if(!session) return;
  if(session.queue.length===0){ finishSession(); return; }
  session.current = session.queue[0];
  showCard();
}
function showCard(){
  const term = terms.find(t=>t.id===session.current);
  if(!term){ session.queue.shift(); nextCard(); return; }
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('judge').classList.remove('show');
  document.getElementById('card-cat').innerHTML = `<span class="dot" style="background:${catDot(term.cat)}"></span>${catName(term.cat)}`;
  document.getElementById('card-en').textContent = term.en;
  document.getElementById('card-en-small').textContent = term.en;
  document.getElementById('card-ja').textContent = term.ja;
  const m = document.getElementById('card-memo');
  if(term.memo && term.memo.trim()){ m.textContent = '📝 ' + term.memo; m.style.display=''; }
  else { m.style.display='none'; }
  updateProgress();
}
function flipCard(){
  const card = document.getElementById('card');
  card.classList.toggle('flipped');
  if(card.classList.contains('flipped')) document.getElementById('judge').classList.add('show');
}

/* 回答：覚えた=true / もう一度=false */
function answer(remembered){
  if(!session) return;
  const card = document.getElementById('card');
  if(!card.classList.contains('flipped')) return; // めくる前は無効
  const id = session.queue.shift();
  const term = terms.find(t=>t.id===id);
  applyReview(term, remembered);   // Leitner更新（両モード共通）
  recordStudy(remembered);         // ストリーク/XP/履歴
  session.answered++;
  if(remembered){
    session.rememberedCount++; session.xp+=10; session.cleared.add(id);
  }else{
    session.againCount++; session.xp+=3;
    // セッション内で後ろのランダム位置へ戻す（＝マスターするまで消えない）
    if(session.queue.length===0) session.queue.push(id);
    else{ const min=Math.min(2,session.queue.length); const pos=min+Math.floor(Math.random()*(session.queue.length-min+1)); session.queue.splice(pos,0,id); }
  }
  checkAchievements();
  nextCard();
}

/* Leitner更新 */
function applyReview(term, remembered){
  if(remembered) term.box = Math.min((term.box||0)+1, MASTER_BOX);
  else { term.box = 1; term.lapses = (term.lapses||0)+1; }
  term.reps = (term.reps||0)+1;
  const iv = INTERVALS[term.box] || 1;
  term.due = addDays(todayStr(), iv);
  term.status = term.box>=MASTER_BOX ? 'mastered' : (term.box>=1 ? 'learning' : 'new');
  saveTerms();
}

/* ストリーク・XP・履歴の記録 */
function recordStudy(remembered){
  const t = todayStr();
  if(prog.todayDate !== t){
    // 日付が変わった → ストリーク判定
    if(prog.lastStudyDay === shiftStr(-1)) prog.streak = (prog.streak||0)+1;
    else if(prog.lastStudyDay === t){} else prog.streak = 1;
    prog.lastStudyDay = t; prog.todayDate = t; prog.todayCount = 0;
  }
  prog.todayCount++;
  prog.totalAnswered = (prog.totalAnswered||0)+1;
  prog.xp = (prog.xp||0) + (remembered?10:3);
  prog.history[t] = (prog.history[t]||0)+1;
  saveProg();
}

function updateProgress(){
  const done = session.cleared.size;
  const pct = session.total? Math.round(done/session.total*100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('remaining').textContent = session.total - done;
}

/* 発音（Web Speech API・無料）
   注意：Macには Zarvox/Deranged/Whisper 等の"おもしろ音声/ホラー音声"が混ざっている。
   英語の標準的で聞き取りやすい声だけを選び、自然な速度で読み上げる。 */
const BAD_VOICES = /Fred|Albert|Bad News|Bahh|Bells|Boing|Bubbles|Cellos|Deranged|Good News|Hysterical|Jester|Organ|Trinoids|Whisper|Wobble|Zarvox|Junior|Ralph|Kathy|Superstar|Grandma|Grandpa|Reed|Rocko|Sandy|Shelley|Eddy|Flo|Wobble|Sing|Novelty/i;
let enVoice = null;
function pickEnglishVoice(){
  if(!('speechSynthesis' in window)) return null;
  const vs = speechSynthesis.getVoices();
  if(!vs.length) return null;
  // 高品質で標準的な英語音声を優先
  const prefer = ['Samantha','Alex','Google US English','Microsoft Zira - English (United States)','Google UK English Female','Daniel','Karen','Victoria','Moira','Tessa','Serena'];
  for(const n of prefer){ const v = vs.find(x=>x.name===n); if(v) return v; }
  // 無ければ「英語」かつ「おもしろ音声でない」ものから
  const en = vs.filter(v=>/^en/i.test(v.lang) && !BAD_VOICES.test(v.name));
  return en.find(v=>/US/i.test(v.lang)) || en[0] || null;
}
if('speechSynthesis' in window){
  enVoice = pickEnglishVoice();
  // 音声リストは非同期で読み込まれることがあるので、読み込まれ次第選び直す
  speechSynthesis.onvoiceschanged = () => { enVoice = pickEnglishVoice(); };
}
function speakCurrent(){
  if(!session || !('speechSynthesis' in window)) { toast('この端末は読み上げ非対応です'); return; }
  const term = terms.find(t=>t.id===session.current);
  if(!term) return;
  speechSynthesis.cancel();
  if(!enVoice) enVoice = pickEnglishVoice();
  const u = new SpeechSynthesisUtterance(term.en);
  if(enVoice){ u.voice = enVoice; u.lang = enVoice.lang; } else { u.lang = 'en-US'; }
  u.rate = 1.0; u.pitch = 1.0;   // 自然な速度・自然な高さ
  speechSynthesis.speak(u);
}

/* バックアップ書き出し / 読み込み（localStorage消失対策） */
function exportData(){
  const data = {v:2, exportedAt:new Date().toISOString(), terms, prog};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  a.download = 'fifa-vocab-backup-' + todayStr() + '.json'; a.click();
  URL.revokeObjectURL(url); toast('バックアップを書き出しました');
}
function handleImport(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.terms || !Array.isArray(data.terms)) throw new Error('形式が不正');
      if(!confirm(`${data.terms.length}語を読み込みます。今のデータは上書きされます。よろしいですか？`)) return;
      terms = data.terms;
      if(data.prog) prog = Object.assign(defaultProg(), data.prog);
      saveTerms(); saveProg(); renderManage(); toast('読み込みました');
    }catch(err){ toast('読み込み失敗：ファイルを確認してください'); }
  };
  reader.readAsText(file);
  ev.target.value='';
}

   =================================================================== */
let tmpGoal = 'normal';
function openOnboarding(){
  tmpGoal = prog.goalKey || 'normal';
  document.getElementById('modal-content').innerHTML = `
    <div class="mark">Welcome</div>
    <div class="ic">⚽</div>
    <h3>覚えるまで、終わらせない。</h3>
    <p>FIFAエージェント試験の英語用語を、夜のピッチで反復マスター。英語が苦手でも大丈夫。</p>
    <div class="feat">
      <div><span class="fic">🔁</span><div><b>完全マスター</b><br>全部「思い出せた」になるまで終わらない学習法</div></div>
      <div><span class="fic">📅</span><div><b>今日の復習</b><br>間隔をあけて毎日少しずつ、忘れる前に出題</div></div>
      <div><span class="fic">🔊</span><div><b>発音</b><br>英語の読み上げで耳からも覚える</div></div>
    </div>
    <p style="margin-bottom:6px;">1日の目標を選んでね（あとで変えられます）</p>
    <div class="goal-opts" id="goal-opts">${goalOptsHtml()}</div>
    <button class="btn btn-primary" onclick="finishOnboarding()">はじめる！</button>`;
  document.getElementById('overlay').classList.add('show');
}
function goalOptsHtml(){
  return Object.keys(GOALS).map(k=>{
    const g=GOALS[k];
    return `<div class="goal-opt ${tmpGoal===k?'sel':''}" onclick="pickGoal('${k}')">
      <div class="gl">${g.label}</div><div class="gr">${g.desc}</div></div>`;
  }).join('');
}
function pickGoal(k){ tmpGoal=k; document.getElementById('goal-opts').innerHTML = goalOptsHtml(); }
function finishOnboarding(){
  prog.onboarded=true; prog.goalKey=tmpGoal; saveProg();
  document.getElementById('overlay').classList.remove('show');
  renderHome();
}
function openGoalModal(){
  tmpGoal = prog.goalKey;
  document.getElementById('modal-content').innerHTML = `
    <div class="ic">🎯</div>
    <h3>1日の目標</h3>
    <p>無理なく続けられる量に。忙しい日でも達成できる目標がコツ。</p>
    <div class="goal-opts" id="goal-opts">${goalOptsHtml()}</div>
    <button class="btn btn-primary" onclick="saveGoalModal()">決定</button>
    <button class="btn btn-ghost" style="margin-top:8px;" onclick="closeOverlay()">キャンセル</button>`;
  document.getElementById('overlay').classList.add('show');
}
function saveGoalModal(){ prog.goalKey=tmpGoal; saveProg(); closeOverlay(); renderHome(); }
function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); }

/* ===================================================================
   ユーティリティ
   =================================================================== */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastTimer;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1900); }

/* キーボード（PC） */
document.addEventListener('keydown', e=>{
  if(!document.getElementById('screen-study').classList.contains('active')) return;
  const flipped = document.getElementById('card').classList.contains('flipped');
  if(e.code==='Space'){ e.preventDefault(); flipCard(); }
  else if(e.key==='1' && flipped) answer(false);
  else if(e.key==='2' && flipped) answer(true);
});

/* ===================================================================
   起動（何かあっても画面が真っ白にならないよう保護）
   =================================================================== */
try{
  loadAll();
  renderHome();
  if(!prog.onboarded) openOnboarding();
}catch(err){
  console.error(err);
  const body = document.getElementById('home-body');
  if(body) body.innerHTML = '<div class="hint" style="margin-top:20px;"><b>うまく起動できませんでした。</b><br>お手数ですが、このファイルを<b>Google Chrome</b>で開きなおすか、ページを再読み込みしてみてください。</div>';
}
</script>
